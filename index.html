<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fish Feeding Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300..700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root,[data-theme="light"]{
  --color-bg:#f0f7fa;--color-surface:#e8f4f8;--color-surface-2:#dff0f6;
  --color-surface-offset:#cce7f0;--color-border:#b0d4e0;--color-divider:#c5dfe8;
  --color-text:#0d2b36;--color-text-muted:#3d6878;--color-text-faint:#7aa3b2;
  --color-primary:#0582a5;--color-success:#2a8a4a;--color-warning:#c07020;--color-error:#c0304a;
  --shadow-md:0 4px 16px oklch(0.25 0.04 220/0.12);--shadow-lg:0 12px 40px oklch(0.25 0.04 220/0.18);
  --radius-sm:0.375rem;--radius-md:0.5rem;--radius-lg:0.75rem;--radius-xl:1rem;--radius-full:9999px;
  --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;
  --space-6:1.5rem;--space-8:2rem;--space-12:3rem;
  --text-xs:clamp(0.75rem,.7rem + .25vw,.875rem);--text-sm:clamp(0.875rem,.8rem + .35vw,1rem);
  --text-base:clamp(1rem,.95rem + .25vw,1.125rem);--text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
  --font-body:'DM Sans','Helvetica Neue',sans-serif;--font-mono:'DM Mono','Courier New',monospace;
  --tr:180ms cubic-bezier(0.16,1,0.3,1);
}
[data-theme="dark"]{
  --color-bg:#071820;--color-surface:#0b2230;--color-surface-2:#0f2c3c;
  --color-surface-offset:#133448;--color-border:#1e4a60;--color-divider:#163c50;
  --color-text:#c8e8f2;--color-text-muted:#6daabe;--color-text-faint:#3d7090;
  --color-primary:#2aafd4;--color-success:#3dbe68;--color-warning:#e8a040;--color-error:#e05070;
  --shadow-md:0 4px 16px oklch(0 0 0/.4);--shadow-lg:0 12px 40px oklch(0 0 0/.5);
}
@media(prefers-color-scheme:dark){:root:not([data-theme]){
  --color-bg:#071820;--color-surface:#0b2230;--color-surface-2:#0f2c3c;
  --color-surface-offset:#133448;--color-border:#1e4a60;--color-divider:#163c50;
  --color-text:#c8e8f2;--color-text-muted:#6daabe;--color-text-faint:#3d7090;
  --color-primary:#2aafd4;--color-success:#3dbe68;--color-warning:#e8a040;--color-error:#e05070;
  --shadow-md:0 4px 16px oklch(0 0 0/.4);--shadow-lg:0 12px 40px oklch(0 0 0/.5);
}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:none;-webkit-font-smoothing:antialiased;}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);transition:background var(--tr),color var(--tr);}
svg,img{display:block;}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;}
:focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm);}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}}

.app-shell{min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:var(--space-6) var(--space-4);background:radial-gradient(ellipse 80% 50% at 50% -10%,oklch(from var(--color-primary) l c h/.08) 0%,transparent 70%),var(--color-bg);}
.top-bar{width:100%;max-width:480px;display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-8);}
.logo{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);font-weight:600;letter-spacing:-.01em;}
.theme-btn{width:36px;height:36px;border-radius:var(--radius-full);display:flex;align-items:center;justify-content:center;color:var(--color-text-muted);background:var(--color-surface);border:1px solid oklch(from var(--color-text) l c h/.1);}
.theme-btn:hover{color:var(--color-text);background:var(--color-surface-2);}

.main-card{width:100%;max-width:480px;background:var(--color-surface);border:1px solid oklch(from var(--color-text) l c h/.08);border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);overflow:hidden;}
.card-header{padding:var(--space-6);border-bottom:1px solid var(--color-divider);display:flex;flex-direction:column;gap:var(--space-3);}
.date-line{font-size:var(--text-xs);color:var(--color-text-faint);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.08em;}
.card-title{font-size:var(--text-xl);font-weight:700;letter-spacing:-.02em;line-height:1.1;}
.card-sub{font-size:var(--text-sm);color:var(--color-text-muted);}
.auto-badge{display:inline-flex;align-items:center;gap:var(--space-1);padding:var(--space-1) var(--space-3);background:color-mix(in oklch,var(--color-primary) 12%,var(--color-surface-2));border:1px solid color-mix(in oklch,var(--color-primary) 25%,transparent);border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:600;color:var(--color-primary);width:fit-content;}

.progress-section{padding:var(--space-8) var(--space-6);display:flex;flex-direction:column;align-items:center;gap:var(--space-6);}
.ring-wrap{position:relative;width:180px;height:180px;}
.ring-svg{width:100%;height:100%;transform:rotate(-90deg);}
.ring-track{fill:none;stroke:var(--color-surface-offset);stroke-width:10;}
.ring-fill{fill:none;stroke:var(--color-primary);stroke-width:10;stroke-linecap:round;stroke-dasharray:408.4;stroke-dashoffset:408.4;transition:stroke-dashoffset .6s cubic-bezier(0.16,1,0.3,1),stroke .4s ease;}
.ring-fill.half{stroke-dashoffset:204.2;stroke:var(--color-warning);}
.ring-fill.full{stroke-dashoffset:0;stroke:var(--color-success);}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:var(--space-1);}
.ring-num{font-size:var(--text-xl);font-weight:700;font-family:var(--font-mono);line-height:1;transition:color .4s;}
.ring-lbl{font-size:var(--text-xs);color:var(--color-text-muted);text-transform:uppercase;letter-spacing:.06em;}

.feed-btns{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3);}
.feed-btn{display:flex;flex-direction:column;align-items:center;gap:var(--space-2);padding:var(--space-5) var(--space-4);border-radius:var(--radius-lg);font-weight:600;font-size:var(--text-sm);border:2px solid transparent;transition:all var(--tr);position:relative;overflow:hidden;}
.feed-btn .ico{font-size:1.75rem;line-height:1;transition:transform var(--tr);}
.feed-btn:hover .ico{transform:scale(1.15) rotate(-5deg);}
.feed-btn:active{transform:scale(.97);}
.feed-btn .sub{font-size:var(--text-xs);font-weight:400;color:var(--color-text-muted);}
.feed-btn.morning{background:color-mix(in oklch,var(--color-warning) 12%,var(--color-surface-2));border-color:color-mix(in oklch,var(--color-warning) 30%,transparent);color:var(--color-warning);}
.feed-btn.morning:hover{background:color-mix(in oklch,var(--color-warning) 20%,var(--color-surface-2));}
.feed-btn.morning.done{background:color-mix(in oklch,var(--color-success) 12%,var(--color-surface-2));border-color:color-mix(in oklch,var(--color-success) 30%,transparent);color:var(--color-success);opacity:.75;}
.feed-btn.evening{background:color-mix(in oklch,var(--color-primary) 12%,var(--color-surface-2));border-color:color-mix(in oklch,var(--color-primary) 30%,transparent);color:var(--color-primary);}
.feed-btn.evening:hover{background:color-mix(in oklch,var(--color-primary) 20%,var(--color-surface-2));}
.feed-btn.evening.done{background:color-mix(in oklch,var(--color-success) 12%,var(--color-surface-2));border-color:color-mix(in oklch,var(--color-success) 30%,transparent);color:var(--color-success);opacity:.75;}

.next-up{width:100%;padding:var(--space-3) var(--space-4);background:color-mix(in oklch,var(--color-primary) 8%,var(--color-surface-2));border:1px solid color-mix(in oklch,var(--color-primary) 20%,transparent);border-radius:var(--radius-md);font-size:var(--text-xs);color:var(--color-primary);display:flex;align-items:center;gap:var(--space-2);font-weight:500;}

.status-banner{margin:0 var(--space-6) var(--space-6);padding:var(--space-4);border-radius:var(--radius-lg);display:flex;align-items:center;gap:var(--space-3);font-size:var(--text-sm);font-weight:500;border:1px solid oklch(from var(--color-text) l c h/.08);transition:all .4s ease;}
.status-banner.s-wait{background:color-mix(in oklch,var(--color-primary) 6%,var(--color-surface-2));border-color:color-mix(in oklch,var(--color-primary) 20%,transparent);color:var(--color-text-muted);}
.status-banner.s-half{background:color-mix(in oklch,var(--color-warning) 8%,var(--color-surface-2));border-color:color-mix(in oklch,var(--color-warning) 25%,transparent);color:var(--color-warning);}
.status-banner.s-done{background:color-mix(in oklch,var(--color-success) 10%,var(--color-surface-2));border-color:color-mix(in oklch,var(--color-success) 30%,transparent);color:var(--color-success);}
.s-ico{font-size:1.2rem;flex-shrink:0;}

.log-section{padding:0 var(--space-6) var(--space-6);}
.log-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-3);}
.log-title{font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--color-text-faint);}
.log-clear{font-size:var(--text-xs);color:var(--color-text-faint);padding:var(--space-1) var(--space-2);border-radius:var(--radius-sm);border:1px solid transparent;}
.log-clear:hover{color:var(--color-error);border-color:oklch(from var(--color-error) l c h/.3);}
.log-list{display:flex;flex-direction:column;gap:var(--space-2);max-height:180px;overflow-y:auto;}
.log-item{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) var(--space-3);background:var(--color-surface-2);border-radius:var(--radius-md);font-size:var(--text-xs);border:1px solid oklch(from var(--color-text) l c h/.06);animation:sIn .25s cubic-bezier(0.16,1,0.3,1);}
@keyframes sIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot.morning{background:var(--color-warning);}
.dot.evening{background:var(--color-primary);}
.log-txt{flex:1;color:var(--color-text-muted);}
.log-time{font-family:var(--font-mono);color:var(--color-text-faint);font-size:.7rem;}
.log-empty{padding:var(--space-4);text-align:center;color:var(--color-text-faint);font-size:var(--text-xs);}

.reset-row{margin:0 var(--space-6) var(--space-6);padding:var(--space-3) var(--space-4);background:var(--color-surface-2);border-radius:var(--radius-md);border:1px solid oklch(from var(--color-text) l c h/.06);display:flex;align-items:center;justify-content:space-between;font-size:var(--text-xs);}
.reset-lbl{color:var(--color-text-faint);}
.reset-val{font-family:var(--font-mono);color:var(--color-text-muted);font-weight:500;}

.toasts{position:fixed;bottom:var(--space-8);left:50%;transform:translateX(-50%);z-index:100;display:flex;flex-direction:column;align-items:center;gap:var(--space-2);pointer-events:none;}
.toast{padding:var(--space-3) var(--space-5);border-radius:var(--radius-full);font-size:var(--text-sm);font-weight:600;white-space:nowrap;box-shadow:var(--shadow-lg);animation:tIn .35s cubic-bezier(0.16,1,0.3,1) forwards;pointer-events:none;}
.toast.success{background:var(--color-success);color:#fff;}
.toast.warning{background:var(--color-warning);color:#fff;}
.toast.info{background:var(--color-primary);color:#fff;}
@keyframes tIn{from{opacity:0;transform:translateY(16px) scale(.92);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes tOut{from{opacity:1;}to{opacity:0;transform:translateY(-10px) scale(.92);}}
.ripple{position:absolute;border-radius:50%;transform:scale(0);animation:rip .5s ease-out;background:oklch(from var(--color-text) l c h/.15);pointer-events:none;}
@keyframes rip{to{transform:scale(4);opacity:0;}}
.log-list::-webkit-scrollbar{width:4px;}
.log-list::-webkit-scrollbar-thumb{background:var(--color-border);border-radius:2px;}
</style>
</head>
<body>
<div class="app-shell">
  <div class="top-bar">
    <div class="logo">
      <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
        <ellipse cx="11" cy="14" rx="8" ry="5.5" stroke="currentColor" stroke-width="1.8" fill="none"/>
        <path d="M19 14C22 10 26 9 26 14C26 19 22 18 19 14Z" fill="currentColor" opacity=".7"/>
        <circle cx="8.5" cy="12.5" r="1.1" fill="currentColor"/>
      </svg>
      Fish Feeding Tracker
    </div>
    <button class="theme-btn" id="themeBtn" aria-label="Switch theme"></button>
  </div>

  <div class="main-card">
    <div class="card-header">
      <div class="date-line" id="dateLine">—</div>
      <div class="card-title">🐠 Fish Food Tracker</div>
      <div class="card-sub">One NFC tag — smart auto-detection by time of day</div>
      <div class="auto-badge">📡 Auto · Before noon = Morning · After noon = Evening</div>
    </div>

    <div class="progress-section">
      <div class="ring-wrap">
        <svg class="ring-svg" viewBox="0 0 140 140">
          <circle class="ring-track" cx="70" cy="70" r="65"/>
          <circle class="ring-fill" id="ringFill" cx="70" cy="70" r="65"/>
        </svg>
        <div class="ring-center">
          <div class="ring-num" id="ringNum">0/2</div>
          <div class="ring-lbl">fed today</div>
        </div>
      </div>

      <div class="feed-btns">
        <button class="feed-btn morning" id="btnM" onclick="handleFeed('morning')">
          <span class="ico">🌅</span><span>Morning</span>
          <span class="sub" id="subM">Not fed</span>
        </button>
        <button class="feed-btn evening" id="btnE" onclick="handleFeed('evening')">
          <span class="ico">🌙</span><span>Evening</span>
          <span class="sub" id="subE">Not fed</span>
        </button>
      </div>

      <div class="next-up" id="nextUp">
        <span>⏭️</span><span id="nextUpTxt">—</span>
      </div>
    </div>

    <div class="status-banner s-wait" id="banner">
      <span class="s-ico" id="bannerIco">🐡</span>
      <span id="bannerTxt">Ready — tap your NFC tag to log a feeding!</span>
    </div>

    <div class="reset-row">
      <span class="reset-lbl">🔄 Resets at midnight</span>
      <span class="reset-val" id="countdown">—</span>
    </div>

    <div class="log-section">
      <div class="log-head">
        <span class="log-title">Today's Log</span>
        <button class="log-clear" onclick="clearLog()">Clear log</button>
      </div>
      <div class="log-list" id="logList">
        <div class="log-empty" id="logEmpty">No feedings logged today</div>
      </div>
    </div>
  </div>
</div>
<div class="toasts" id="toasts"></div>

<script>
// ── Storage helpers ──────────────────────────────────────────────
const STORE_KEY = "fishFeedState";

function todayStr() {
  const d = new Date();
  return d.getFullYear() + "-" + d.getMonth() + "-" + d.getDate();
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return freshState();
    const s = JSON.parse(raw);
    // If stored date is not today, return fresh state (auto daily reset)
    if (s.date !== todayStr()) return freshState();
    // Parse ISO strings back to Date objects
    if (s.morning) s.morning = new Date(s.morning);
    if (s.evening) s.evening = new Date(s.evening);
    return s;
  } catch(e) { return freshState(); }
}

function freshState() {
  return { date: todayStr(), morning: null, evening: null, log: [] };
}

function saveState() {
  try {
    // Serialize dates as ISO strings for storage
    const toStore = {
      date: state.date,
      morning: state.morning ? state.morning.toISOString() : null,
      evening: state.evening ? state.evening.toISOString() : null,
      log: state.log
    };
    localStorage.setItem(STORE_KEY, JSON.stringify(toStore));
  } catch(e) {}
}

// ── App state ────────────────────────────────────────────────────
let state = loadState();

// ── Auto-detect meal by time ─────────────────────────────────────
function getAutoMeal() {
  return new Date().getHours() < 12 ? "morning" : "evening";
}

// ── Feed handler ─────────────────────────────────────────────────
function handleFeed(meal) {
  if (state[meal]) {
    const t = state[meal].toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
    const label = meal === "morning" ? "Morning" : "Evening";
    showToast(label + " already fed at " + t + "! 🐟", "warning");
    return;
  }
  // Ripple on button
  const btn = document.getElementById(meal === "morning" ? "btnM" : "btnE");
  const r = document.createElement("div"); r.className = "ripple";
  r.style.cssText = "width:100px;height:100px;left:50%;top:50%;margin:-50px 0 0 -50px;";
  btn.appendChild(r); setTimeout(() => r.remove(), 500);

  const now = new Date();
  state[meal] = now;
  const t = now.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
  const label = meal === "morning" ? "🌅 Morning" : "🌙 Evening";
  state.log.unshift({ meal, time: t, label });
  saveState(); // ← persist immediately
  render();
  showToast(label + " feeding logged at " + t + " ✓", "success");
}

function handleAutoFeed() {
  if (state.morning && state.evening) {
    showToast("✅ Both feedings done for today!", "info"); return;
  }
  handleFeed(getAutoMeal());
}

// ── Render ───────────────────────────────────────────────────────
function render() {
  const fed = (state.morning ? 1 : 0) + (state.evening ? 1 : 0);

  // Date
  document.getElementById("dateLine").textContent =
    new Date().toLocaleDateString("en-US", {weekday:"long", month:"long", day:"numeric", year:"numeric"});

  // Ring
  const ring = document.getElementById("ringFill");
  ring.className = "ring-fill" + (fed === 1 ? " half" : fed === 2 ? " full" : "");
  document.getElementById("ringNum").textContent = fed + "/2";

  // Buttons
  ["morning","evening"].forEach(meal => {
    const btn = document.getElementById(meal === "morning" ? "btnM" : "btnE");
    const sub = document.getElementById(meal === "morning" ? "subM" : "subE");
    if (state[meal]) {
      btn.classList.add("done");
      sub.textContent = "Fed at " + state[meal].toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"}) + " ✓";
    } else {
      btn.classList.remove("done");
      sub.textContent = "Not fed";
    }
  });

  // Next up
  const nextUp = document.getElementById("nextUp");
  const nextTxt = document.getElementById("nextUpTxt");
  if (fed < 2) {
    nextUp.style.display = "flex";
    if (fed === 0) {
      const meal = getAutoMeal();
      nextTxt.textContent = "NFC tap → " + (meal === "morning" ? "🌅 Morning (before noon)" : "🌙 Evening (after noon)");
    } else {
      const rem = state.morning ? "🌙 Evening" : "🌅 Morning";
      nextTxt.textContent = "NFC tap → " + rem + " feeding";
    }
  } else {
    nextUp.style.display = "none";
  }

  // Status banner
  const banner = document.getElementById("banner");
  const ico = document.getElementById("bannerIco");
  const txt = document.getElementById("bannerTxt");
  banner.className = "status-banner";
  if (fed === 0) {
    banner.classList.add("s-wait"); ico.textContent = "🐡";
    txt.textContent = "Ready — tap your NFC tag to log a feeding!";
  } else if (fed === 1) {
    banner.classList.add("s-half"); ico.textContent = "🟡";
    txt.textContent = "1 of 2 done. " + (state.morning ? "Evening" : "Morning") + " feeding still needed.";
  } else {
    banner.classList.add("s-done"); ico.textContent = "✅";
    txt.textContent = "All done! Your fish have been fed twice today 🐠";
  }

  // Log
  const list = document.getElementById("logList");
  const empty = document.getElementById("logEmpty");
  list.querySelectorAll(".log-item").forEach(e => e.remove());
  if (state.log.length === 0) {
    empty.style.display = "block";
  } else {
    empty.style.display = "none";
    state.log.forEach(entry => {
      const el = document.createElement("div"); el.className = "log-item";
      el.innerHTML = '<div class="dot ' + entry.meal + '"></div>' +
        '<span class="log-txt">' + entry.label + ' feeding</span>' +
        '<span class="log-time">' + entry.time + '</span>';
      list.appendChild(el);
    });
  }
}

function clearLog() { state.log = []; saveState(); render(); }

// ── Toast ────────────────────────────────────────────────────────
function showToast(msg, type, dur) {
  dur = dur || 3000;
  const c = document.getElementById("toasts");
  const t = document.createElement("div"); t.className = "toast " + type; t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.style.animation = "tOut .3s ease forwards"; setTimeout(() => t.remove(), 300); }, dur);
}

// ── Countdown ────────────────────────────────────────────────────
function tick() {
  const now = new Date(), mid = new Date(now);
  mid.setHours(24,0,0,0);
  const d = mid - now;
  const h = Math.floor(d/3600000), m = Math.floor((d%3600000)/60000), s = Math.floor((d%60000)/1000);
  document.getElementById("countdown").textContent =
    String(h).padStart(2,"0") + ":" + String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");
  // Auto reset at midnight
  if (todayStr() !== state.date) { state = freshState(); saveState(); render(); showToast("🌅 New day! Feedings reset.", "info"); }
}
setInterval(tick, 1000);

// ── Theme toggle ─────────────────────────────────────────────────
(function(){
  const btn = document.getElementById("themeBtn");
  const root = document.documentElement;
  let theme = localStorage.getItem("fishTheme") || (matchMedia("(prefers-color-scheme:dark)").matches ? "dark" : "light");
  root.setAttribute("data-theme", theme); setIcon(theme);
  btn.addEventListener("click", () => {
    theme = theme === "dark" ? "light" : "dark";
    root.setAttribute("data-theme", theme);
    try { localStorage.setItem("fishTheme", theme); } catch(e){}
    setIcon(theme);
  });
  function setIcon(t) {
    btn.innerHTML = t === "dark"
      ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    btn.setAttribute("aria-label", "Switch to " + (t==="dark"?"light":"dark") + " mode");
  }
})();

// ── NFC / URL param handler ──────────────────────────────────────
(function(){
  const feed = new URLSearchParams(window.location.search).get("feed");
  if (feed) {
    setTimeout(() => {
      if (feed === "auto") handleAutoFeed();
      else if (feed === "morning" || feed === "evening") handleFeed(feed);
    }, 300);
  }
})();

// ── Init ─────────────────────────────────────────────────────────
render();
tick();
</script>
