<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fish Feeding Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300..700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root, [data-theme="light"] {
  --color-bg:#f0f7fa;--color-surface:#e8f4f8;--color-surface-2:#dff0f6;
  --color-surface-offset:#cce7f0;--color-border:#b0d4e0;--color-divider:#c5dfe8;
  --color-text:#0d2b36;--color-text-muted:#3d6878;--color-text-faint:#7aa3b2;
  --color-text-inverse:#f0f7fa;--color-primary:#0582a5;--color-primary-hover:#046b8a;
  --color-primary-active:#034f66;--color-primary-highlight:#b8dce8;
  --color-success:#2a8a4a;--color-success-hover:#1e6b38;--color-success-highlight:#c0e4cc;
  --color-warning:#c07020;--color-warning-highlight:#f0dcc0;
  --color-error:#c0304a;--color-error-highlight:#f0c0c8;
  --shadow-sm:0 1px 3px oklch(0.25 0.04 220/0.08);--shadow-md:0 4px 16px oklch(0.25 0.04 220/0.12);--shadow-lg:0 12px 40px oklch(0.25 0.04 220/0.18);
  --radius-sm:0.375rem;--radius-md:0.5rem;--radius-lg:0.75rem;--radius-xl:1rem;--radius-full:9999px;
  --space-1:0.25rem;--space-2:0.5rem;--space-3:0.75rem;--space-4:1rem;--space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;--space-12:3rem;--space-16:4rem;
  --text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);--text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);--text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);--text-lg:clamp(1.125rem,1rem + 0.75vw,1.5rem);--text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
  --font-body:'DM Sans','Helvetica Neue',sans-serif;--font-mono:'DM Mono','Courier New',monospace;
  --transition-interactive:180ms cubic-bezier(0.16,1,0.3,1);
}
[data-theme="dark"] {
  --color-bg:#071820;--color-surface:#0b2230;--color-surface-2:#0f2c3c;
  --color-surface-offset:#133448;--color-border:#1e4a60;--color-divider:#163c50;
  --color-text:#c8e8f2;--color-text-muted:#6daabe;--color-text-faint:#3d7090;
  --color-text-inverse:#071820;--color-primary:#2aafd4;--color-primary-hover:#52c0de;
  --color-primary-active:#7ad0e6;--color-primary-highlight:#0d3a4a;
  --color-success:#3dbe68;--color-success-hover:#60cc82;--color-success-highlight:#0a3020;
  --color-warning:#e8a040;--color-warning-highlight:#382810;
  --color-error:#e05070;--color-error-highlight:#380818;
  --shadow-sm:0 1px 3px oklch(0 0 0/0.3);--shadow-md:0 4px 16px oklch(0 0 0/0.4);--shadow-lg:0 12px 40px oklch(0 0 0/0.5);
}
@media(prefers-color-scheme:dark){:root:not([data-theme]){--color-bg:#071820;--color-surface:#0b2230;--color-surface-2:#0f2c3c;--color-surface-offset:#133448;--color-border:#1e4a60;--color-divider:#163c50;--color-text:#c8e8f2;--color-text-muted:#6daabe;--color-text-faint:#3d7090;--color-text-inverse:#071820;--color-primary:#2aafd4;--color-primary-hover:#52c0de;--color-primary-active:#7ad0e6;--color-primary-highlight:#0d3a4a;--color-success:#3dbe68;--color-success-hover:#60cc82;--color-success-highlight:#0a3020;--color-warning:#e8a040;--color-warning-highlight:#382810;--color-error:#e05070;--color-error-highlight:#380818;--shadow-sm:0 1px 3px oklch(0 0 0/0.3);--shadow-md:0 4px 16px oklch(0 0 0/0.4);--shadow-lg:0 12px 40px oklch(0 0 0/0.5);}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:none;text-size-adjust:none;-webkit-font-smoothing:antialiased;scroll-behavior:smooth;}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background-color:var(--color-bg);transition:background var(--transition-interactive),color var(--transition-interactive);}
img,svg{display:block;}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;}
a,button,[role="button"]{transition:color var(--transition-interactive),background var(--transition-interactive),border-color var(--transition-interactive),box-shadow var(--transition-interactive),opacity var(--transition-interactive),transform var(--transition-interactive);}
:focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm);}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important;}}

.app-shell{min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:var(--space-6) var(--space-4);background:radial-gradient(ellipse 80% 50% at 50% -10%,oklch(from var(--color-primary) l c h/0.08) 0%,transparent 70%),var(--color-bg);}
.top-bar{width:100%;max-width:480px;display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-8);}
.logo{display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);font-weight:600;color:var(--color-text);letter-spacing:-0.01em;}
.theme-toggle{width:36px;height:36px;border-radius:var(--radius-full);display:flex;align-items:center;justify-content:center;color:var(--color-text-muted);background:var(--color-surface);border:1px solid oklch(from var(--color-text) l c h/0.1);}
.theme-toggle:hover{color:var(--color-text);background:var(--color-surface-2);}
.main-card{width:100%;max-width:480px;background:var(--color-surface);border:1px solid oklch(from var(--color-text) l c h/0.08);border-radius:var(--radius-xl);box-shadow:var(--shadow-lg);overflow:hidden;}
.card-header{padding:var(--space-6);border-bottom:1px solid var(--color-divider);display:flex;flex-direction:column;gap:var(--space-3);}
.date-display{font-size:var(--text-xs);color:var(--color-text-faint);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.08em;}
.fish-title{font-size:var(--text-xl);font-weight:700;letter-spacing:-0.02em;line-height:1.1;color:var(--color-text);}
.fish-subtitle{font-size:var(--text-sm);color:var(--color-text-muted);}

/* Auto-detect badge */
.auto-badge{display:inline-flex;align-items:center;gap:var(--space-1);padding:var(--space-1) var(--space-3);background:color-mix(in oklch,var(--color-primary) 12%,var(--color-surface-2));border:1px solid color-mix(in oklch,var(--color-primary) 25%,transparent);border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:600;color:var(--color-primary);width:fit-content;}

.progress-section{padding:var(--space-8) var(--space-6);display:flex;flex-direction:column;align-items:center;gap:var(--space-6);}
.ring-container{position:relative;width:180px;height:180px;}
.ring-svg{width:100%;height:100%;transform:rotate(-90deg);}
.ring-track{fill:none;stroke:var(--color-surface-offset);stroke-width:10;}
.ring-fill{fill:none;stroke:var(--color-primary);stroke-width:10;stroke-linecap:round;stroke-dasharray:408.4;stroke-dashoffset:408.4;transition:stroke-dashoffset 0.6s cubic-bezier(0.16,1,0.3,1),stroke 0.4s ease;}
.ring-fill.half{stroke-dashoffset:204.2;stroke:var(--color-warning);}
.ring-fill.full{stroke-dashoffset:0;stroke:var(--color-success);}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:var(--space-1);}
.ring-number{font-size:var(--text-xl);font-weight:700;font-family:var(--font-mono);color:var(--color-text);line-height:1;transition:color 0.4s ease;}
.ring-label{font-size:var(--text-xs);color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.06em;}

.feed-buttons{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3);}
.feed-btn{display:flex;flex-direction:column;align-items:center;gap:var(--space-2);padding:var(--space-5) var(--space-4);border-radius:var(--radius-lg);font-weight:600;font-size:var(--text-sm);cursor:pointer;border:2px solid transparent;transition:all var(--transition-interactive);position:relative;overflow:hidden;}
.feed-btn .btn-icon{font-size:1.75rem;line-height:1;transition:transform var(--transition-interactive);}
.feed-btn:hover .btn-icon{transform:scale(1.15) rotate(-5deg);}
.feed-btn:active{transform:scale(0.97);}
.feed-btn.morning{background:color-mix(in oklch,var(--color-warning) 12%,var(--color-surface-2));border-color:color-mix(in oklch,var(--color-warning) 30%,transparent);color:var(--color-warning);}
.feed-btn.morning:hover{background:color-mix(in oklch,var(--color-warning) 20%,var(--color-surface-2));border-color:color-mix(in oklch,var(--color-warning) 50%,transparent);}
.feed-btn.morning.done{background:color-mix(in oklch,var(--color-success) 12%,var(--color-surface-2));border-color:color-mix(in oklch,var(--color-success) 30%,transparent);color:var(--color-success);opacity:0.7;}
.feed-btn.evening{background:color-mix(in oklch,var(--color-primary) 12%,var(--color-surface-2));border-color:color-mix(in oklch,var(--color-primary) 30%,transparent);color:var(--color-primary);}
.feed-btn.evening:hover{background:color-mix(in oklch,var(--color-primary) 20%,var(--color-surface-2));border-color:color-mix(in oklch,var(--color-primary) 50%,transparent);}
.feed-btn.evening.done{background:color-mix(in oklch,var(--color-success) 12%,var(--color-surface-2));border-color:color-mix(in oklch,var(--color-success) 30%,transparent);color:var(--color-success);opacity:0.7;}
.feed-btn .btn-status{font-size:var(--text-xs);font-weight:400;color:var(--color-text-muted);opacity:0.8;}

/* Next up indicator */
.next-up{width:100%;padding:var(--space-3) var(--space-4);background:color-mix(in oklch,var(--color-primary) 8%,var(--color-surface-2));border:1px solid color-mix(in oklch,var(--color-primary) 20%,transparent);border-radius:var(--radius-md);font-size:var(--text-xs);color:var(--color-primary);display:flex;align-items:center;gap:var(--space-2);font-weight:500;}

.status-banner{margin:0 var(--space-6) var(--space-6);padding:var(--space-4);border-radius:var(--radius-lg);display:flex;align-items:center;gap:var(--space-3);font-size:var(--text-sm);font-weight:500;background:var(--color-surface-2);border:1px solid oklch(from var(--color-text) l c h/0.08);transition:all 0.4s ease;}
.status-banner.status-waiting{background:color-mix(in oklch,var(--color-primary) 6%,var(--color-surface-2));border-color:color-mix(in oklch,var(--color-primary) 20%,transparent);color:var(--color-text-muted);}
.status-banner.status-half{background:color-mix(in oklch,var(--color-warning) 8%,var(--color-surface-2));border-color:color-mix(in oklch,var(--color-warning) 25%,transparent);color:var(--color-warning);}
.status-banner.status-done{background:color-mix(in oklch,var(--color-success) 10%,var(--color-surface-2));border-color:color-mix(in oklch,var(--color-success) 30%,transparent);color:var(--color-success);}
.status-icon{font-size:1.2rem;flex-shrink:0;}

.log-section{padding:0 var(--space-6) var(--space-6);}
.log-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-3);}
.log-title{font-size:var(--text-xs);font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--color-text-faint);}
.log-clear{font-size:var(--text-xs);color:var(--color-text-faint);padding:var(--space-1) var(--space-2);border-radius:var(--radius-sm);border:1px solid transparent;}
.log-clear:hover{color:var(--color-error);border-color:oklch(from var(--color-error) l c h/0.3);}
.log-list{display:flex;flex-direction:column;gap:var(--space-2);max-height:180px;overflow-y:auto;}
.log-item{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) var(--space-3);background:var(--color-surface-2);border-radius:var(--radius-md);font-size:var(--text-xs);border:1px solid oklch(from var(--color-text) l c h/0.06);animation:slideIn 0.25s cubic-bezier(0.16,1,0.3,1);}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
.log-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.log-dot.morning{background:var(--color-warning);}
.log-dot.evening{background:var(--color-primary);}
.log-text{flex:1;color:var(--color-text-muted);}
.log-time{font-family:var(--font-mono);color:var(--color-text-faint);font-size:0.7rem;}
.log-empty{padding:var(--space-4);text-align:center;color:var(--color-text-faint);font-size:var(--text-xs);}

.reset-info{margin:0 var(--space-6) var(--space-6);padding:var(--space-3) var(--space-4);background:var(--color-surface-2);border-radius:var(--radius-md);border:1px solid oklch(from var(--color-text) l c h/0.06);display:flex;align-items:center;justify-content:space-between;font-size:var(--text-xs);}
.reset-label{color:var(--color-text-faint);}
.reset-time{font-family:var(--font-mono);color:var(--color-text-muted);font-weight:500;}

.toast-container{position:fixed;bottom:var(--space-8);left:50%;transform:translateX(-50%);z-index:100;display:flex;flex-direction:column;align-items:center;gap:var(--space-2);pointer-events:none;}
.toast{padding:var(--space-3) var(--space-5);border-radius:var(--radius-full);font-size:var(--text-sm);font-weight:600;white-space:nowrap;box-shadow:var(--shadow-lg);animation:toastIn 0.35s cubic-bezier(0.16,1,0.3,1) forwards;pointer-events:none;}
.toast.success{background:var(--color-success);color:#fff;}
.toast.warning{background:var(--color-warning);color:#fff;}
.toast.info{background:var(--color-primary);color:#fff;}
@keyframes toastIn{from{opacity:0;transform:translateY(16px) scale(0.92);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes toastOut{from{opacity:1;transform:translateY(0) scale(1);}to{opacity:0;transform:translateY(-10px) scale(0.92);}}
.ripple{position:absolute;border-radius:50%;transform:scale(0);animation:rippleAnim 0.5s ease-out;background:oklch(from var(--color-text) l c h/0.15);pointer-events:none;}
@keyframes rippleAnim{to{transform:scale(4);opacity:0;}}
.log-list::-webkit-scrollbar{width:4px;}
.log-list::-webkit-scrollbar-track{background:transparent;}
.log-list::-webkit-scrollbar-thumb{background:var(--color-border);border-radius:2px;}
</style>
</head>
<body>
<div class="app-shell">
  <div class="top-bar">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-label="Fish Feed logo">
        <ellipse cx="11" cy="14" rx="8" ry="5.5" stroke="currentColor" stroke-width="1.8" fill="none"/>
        <path d="M19 14 C22 10,26 9,26 14 C26 19,22 18,19 14Z" fill="currentColor" opacity="0.7"/>
        <circle cx="8.5" cy="12.5" r="1.1" fill="currentColor"/>
        <path d="M14 10.5 Q16 8 15 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>
      </svg>
      Fish Feeding Tracker
    </div>
    <button class="theme-toggle" data-theme-toggle aria-label="Switch theme">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>

  <div class="main-card">
    <div class="card-header">
      <div class="date-display" id="dateDisplay">—</div>
      <div class="fish-title">🐠 Fish Food Tracker</div>
      <div class="fish-subtitle">One NFC tag — smart auto-detection by time of day</div>
      <div class="auto-badge">📡 Auto-detect mode · Before noon = Morning · After noon = Evening</div>
    </div>

    <div class="progress-section">
      <div class="ring-container" aria-label="Feeding progress" role="status">
        <svg class="ring-svg" viewBox="0 0 140 140">
          <circle class="ring-track" cx="70" cy="70" r="65"/>
          <circle class="ring-fill" id="ringFill" cx="70" cy="70" r="65"/>
        </svg>
        <div class="ring-center">
          <div class="ring-number" id="ringNumber">0/2</div>
          <div class="ring-label">fed today</div>
        </div>
      </div>

      <div class="feed-buttons">
        <button class="feed-btn morning" id="btnMorning" onclick="handleFeed('morning')">
          <span class="btn-icon">🌅</span>
          <span>Morning</span>
          <span class="btn-status" id="morningStatus">Not fed</span>
        </button>
        <button class="feed-btn evening" id="btnEvening" onclick="handleFeed('evening')">
          <span class="btn-icon">🌙</span>
          <span>Evening</span>
          <span class="btn-status" id="eveningStatus">Not fed</span>
        </button>
      </div>

      <div class="next-up" id="nextUp" style="display:none;">
        <span>⏭️</span><span id="nextUpText"></span>
      </div>
    </div>

    <div class="status-banner status-waiting" id="statusBanner">
      <span class="status-icon" id="statusIcon">🐡</span>
      <span id="statusText">Ready — tap your NFC tag to log a feeding!</span>
    </div>

    <div class="reset-info">
      <span class="reset-label">🔄 Resets at midnight</span>
      <span class="reset-time" id="resetCountdown">—</span>
    </div>

    <div class="log-section">
      <div class="log-header">
        <span class="log-title">Today's Log</span>
        <button class="log-clear" onclick="clearLog()">Clear log</button>
      </div>
      <div class="log-list" id="logList">
        <div class="log-empty" id="logEmpty">No feedings logged today</div>
      </div>
    </div>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>

<script>
let state={morning:null,evening:null,log:[],today:todayKey()};

function todayKey(){const d=new Date();return d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate();}

function checkDayReset(){
  const now=todayKey();
  if(now!==state.today){state.morning=null;state.evening=null;state.log=[];state.today=now;render();showToast("🌅 New day! Feedings reset.","info");}
}
setInterval(checkDayReset,30000);

// Core auto-detect: before noon = morning, after noon = evening
function getAutoMeal(){
  const hour=new Date().getHours();
  return hour < 12 ? "morning" : "evening";
}

function handleFeed(meal){
  const btn=document.getElementById(meal==="morning"?"btnMorning":"btnEvening");
  if(state[meal]){
    const t=state[meal].toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
    const label=meal==="morning"?"Morning":"Evening";
    showToast(label+" already fed at "+t+"! 🐟","warning");
    return;
  }
  // Ripple
  const ripple=document.createElement("div");ripple.className="ripple";
  ripple.style.cssText="width:100px;height:100px;left:50%;top:50%;margin-left:-50px;margin-top:-50px;";
  btn.appendChild(ripple);setTimeout(()=>ripple.remove(),500);

  const now=new Date();state[meal]=now;
  const t=now.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  const label=meal==="morning"?"🌅 Morning":"🌙 Evening";
  state.log.unshift({meal,time:t,label});
  render();
  showToast(label+" feeding logged at "+t+" ✓","success");
}

function handleAutoFeed(){
  // If both done, show status only
  if(state.morning && state.evening){
    showToast("✅ Both feedings done for today!","info");
    return;
  }
  const meal=getAutoMeal();
  handleFeed(meal);
}

function render(){
  const fedCount=(state.morning?1:0)+(state.evening?1:0);
  const d=new Date();
  document.getElementById("dateDisplay").textContent=
    d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});

  // Ring
  const ring=document.getElementById("ringFill");
  const ringNum=document.getElementById("ringNumber");
  ring.className="ring-fill";
  if(fedCount===1)ring.classList.add("half");
  if(fedCount===2)ring.classList.add("full");
  ringNum.textContent=fedCount+"/2";

  // Buttons
  const updateBtn=(id,statusId,meal)=>{
    const btn=document.getElementById(id);
    const status=document.getElementById(statusId);
    if(state[meal]){
      btn.classList.add("done");
      const t=state[meal].toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
      status.textContent="Fed at "+t+" ✓";
    } else {
      btn.classList.remove("done");
      status.textContent="Not fed";
    }
  };
  updateBtn("btnMorning","morningStatus","morning");
  updateBtn("btnEvening","eveningStatus","evening");

  // Next up indicator
  const nextUp=document.getElementById("nextUp");
  const nextUpText=document.getElementById("nextUpText");
  if(fedCount===0){
    nextUp.style.display="flex";
    const meal=getAutoMeal();
    nextUpText.textContent="NFC tap will log: "+(meal==="morning"?"🌅 Morning (before noon)":"🌙 Evening (after noon)");
  } else if(fedCount===1){
    nextUp.style.display="flex";
    const remaining=state.morning?"🌙 Evening":"🌅 Morning";
    nextUpText.textContent="NFC tap will log: "+remaining+" feeding";
  } else {
    nextUp.style.display="none";
  }

  // Status banner
  const banner=document.getElementById("statusBanner");
  const icon=document.getElementById("statusIcon");
  const text=document.getElementById("statusText");
  banner.className="status-banner";
  if(fedCount===0){
    banner.classList.add("status-waiting");icon.textContent="🐡";
    text.textContent="Ready — tap your NFC tag to log a feeding!";
  } else if(fedCount===1){
    banner.classList.add("status-half");icon.textContent="🟡";
    const remaining=state.morning?"Evening":"Morning";
    text.textContent="1 of 2 done. "+remaining+" feeding still needed.";
  } else {
    banner.classList.add("status-done");icon.textContent="✅";
    text.textContent="All done! Your fish have been fed twice today 🐠";
  }

  // Log
  const logList=document.getElementById("logList");
  const logEmpty=document.getElementById("logEmpty");
  if(state.log.length===0){
    logEmpty.style.display="block";
    logList.querySelectorAll(".log-item").forEach(e=>e.remove());
  } else {
    logEmpty.style.display="none";
    logList.querySelectorAll(".log-item").forEach(e=>e.remove());
    state.log.forEach(entry=>{
      const item=document.createElement("div");item.className="log-item";
      item.innerHTML='<div class="log-dot '+entry.meal+'"></div><span class="log-text">'+entry.label+' feeding</span><span class="log-time">'+entry.time+"</span>";
      logList.appendChild(item);
    });
  }
}

function clearLog(){state.log=[];render();}

function showToast(msg,type="info",duration=3000){
  const c=document.getElementById("toastContainer");
  const t=document.createElement("div");t.className="toast "+type;t.textContent=msg;c.appendChild(t);
  setTimeout(()=>{t.style.animation="toastOut 0.3s ease forwards";setTimeout(()=>t.remove(),300);},duration);
}

function updateCountdown(){
  const now=new Date();const midnight=new Date(now);midnight.setHours(24,0,0,0);
  const diff=midnight-now;
  const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
  document.getElementById("resetCountdown").textContent=
    String(h).padStart(2,"0")+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}
setInterval(updateCountdown,1000);

// Theme toggle
(function(){
  const toggle=document.querySelector("[data-theme-toggle]");
  const root=document.documentElement;
  let theme=matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light";
  root.setAttribute("data-theme",theme);updateIcon(theme);
  toggle.addEventListener("click",()=>{theme=theme==="dark"?"light":"dark";root.setAttribute("data-theme",theme);updateIcon(theme);});
  function updateIcon(t){
    toggle.innerHTML=t==="dark"
      ?'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      :'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    toggle.setAttribute("aria-label","Switch to "+(t==="dark"?"light":"dark")+" mode");
  }
})();

// URL param handler — supports ?feed=auto, ?feed=morning, ?feed=evening
(function(){
  const params=new URLSearchParams(window.location.search);
  const feed=params.get("feed");
  if(feed){
    setTimeout(()=>{
      if(feed==="auto") handleAutoFeed();
      else if(feed==="morning"||feed==="evening") handleFeed(feed);
    },400);
  }
})();

render();
updateCountdown();
</script>
</body>
</html>
